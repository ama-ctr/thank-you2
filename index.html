<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ありがとうを つたえよう！</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif;
            background-color: #f0fdf4; /* とても優しい薄緑色の背景 */
            color: #374151;
        }
        
        .question-card {
            background-color: #ffffff;
            border-radius: 1.5rem; /* 角をとても丸く */
            padding: 1.75rem;
            margin-bottom: 2rem;
            border: 4px solid #ccfbf1; /* 柔らかい太枠 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        .question-card:focus-within {
            border-color: #5eead4; /* 入力中は枠の色を少し濃くして目立たせる */
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -3px rgba(94, 234, 212, 0.2);
        }

        .hint-box {
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1; /* 点線でヒントエリアを区切る */
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
